    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        a,
        button,
        div,
        span {
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #eef2f5;
            display: flex;
            justify-content: center
        }

        .page {
            width: 794px;
            min-height: 100vh;
            background: #fff;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.08);
            position: relative;
            overflow: hidden;
        }

        @media(max-width:800px) {
            .page {
                width: 100%;
                box-shadow: none
            }
        }

        .topbar {
            position: fixed;
            top: 0;
            width: 794px;
            height: 60px;
            background: #2b9e75;
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 15px;
            z-index: 9999;
        }

        @media(max-width:800px) {
            .topbar {
                width: 100%
            }
        }

        .back-btn {
            font-size: 20px;
            cursor: pointer;
            margin-right: 10px;
            transition: .3s;
        }

        .back-btn:hover {
            transform: translateX(-6px)
        }

        .content {
            padding-top: 70px
        }

        .header {
            text-align: center;
            padding: 20px;
            background: #f7f1e8;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
        }

        .card {
            margin: 12px 15px;
            padding: 16px;
            border-radius: 14px;
            background: #f9f9f9;
            cursor: pointer;
            transition: .3s;
            opacity: 0;
            transform: translateY(40px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            background: #2b9e75;
            color: #fff;
        }

        .card.show {
            opacity: 1;
            transform: translateY(0);
            transition: .6s ease;
        }

        .viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 99999;
            display: none;
            flex-direction: column;
        }

        .viewer.active {
            display: flex
        }

        .viewer-header {
            height: 60px;
            background: #2b9e75;
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 15px;
        }

        .viewer iframe {
            flex: 1;
            width: 100%;
            border: none;
        }

        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .dots {
            display: flex;
            gap: 10px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #2b9e75;
            border-radius: 50%;
            animation: bounce 0.5s infinite alternate;
        }

        .dot:nth-child(2) {
            animation-delay: 0.15s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes bounce {
            from {
                transform: translateY(0);
                opacity: 0.5;
            }

            to {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
    </style>

        const type = params.get("type") || "nobi";

        const current = CONFIG.sections[type];

        /* TITLE CHANGE */
        document.getElementById("pageTitle").innerText = current.name;
        document.getElementById("bookName").innerText = current.name;
        document.getElementById("headerTitle").innerText = current.name;

        /* LIST CREATE */
        current.books.forEach(item => {
            const div = document.createElement("div");
            div.className = "card";
            div.innerText = item.title;

            div.onclick = () => openPDF(item.title, item.pdf);

            list.appendChild(div);
        });

        /* VIEWER */
        const viewer = document.getElementById("viewer");
        const frame = document.getElementById("frame");
        const loader = document.getElementById("loader");
        const viewerTitle = document.getElementById("viewerTitle");

        function openPDF(title, link) {
            viewer.classList.add("active");
            loader.style.display = "flex";
            frame.style.display = "none";
            viewerTitle.innerText = title;

            frame.src = link;

            frame.onload = () => {
                loader.style.display = "none";
                frame.style.display = "block";
            };
        }

        function closeViewer() {
            viewer.classList.remove("active");
            frame.src = "";
        }

        /* BACK */
        function goBack() {
            location.href = "index.html#jiboni";
        }

        /* ANIMATION */
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (e.isIntersecting) e.target.classList.add("show");
            });
        });

        setTimeout(() => {
            document.querySelectorAll('.card').forEach(el => observer.observe(el));
        }, 100);

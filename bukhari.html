<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Hadith Book</title>

    <!-- =========================
🔒 SECURITY (safe but usable)
========================= -->
    <meta http-equiv="Content-Security-Policy" content="
default-src 'self';
img-src 'self' data:;
style-src 'self' 'unsafe-inline';
script-src 'self' 'unsafe-inline';
frame-src 'self' https://drive.google.com;
object-src 'none';
base-uri 'self';
form-action 'self';
frame-ancestors 'none';
">

    <style>
        /* =========================
RESET
========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #eef2f5;
            display: flex;
            justify-content: center
        }

        /* =========================
PAGE
========================= */
        .page {
            width: 794px;
            min-height: 100vh;
            background: #fff;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.08);
            position: relative;
            overflow: hidden;
        }

        @media(max-width:800px) {
            .page {
                width: 100%;
                box-shadow: none
            }
        }

        /* =========================
TOPBAR
========================= */
        .topbar {
            position: fixed;
            top: 0;
            width: 794px;
            height: 60px;
            background: #2b9e75;
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 15px;
            z-index: 9999;
        }

        @media(max-width:800px) {
            .topbar {
                width: 100%
            }
        }

        .back-btn {
            font-size: 20px;
            cursor: pointer;
            margin-right: 10px;
            transition: .3s;
        }

        .back-btn:hover {
            transform: translateX(-6px)
        }

        /* =========================
CONTENT
========================= */
        .content {
            padding-top: 70px
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 20px;
            background: #f7f1e8;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
        }

        /* =========================
CARD (PDF LIST)
========================= */
        .card {
            margin: 12px 15px;
            padding: 16px;
            border-radius: 14px;
            background: #f9f9f9;
            cursor: pointer;
            transition: .3s;
            opacity: 0;
            transform: translateY(40px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            background: #2b9e75;
            color: #fff;
        }

        .card.show {
            opacity: 1;
            transform: translateY(0);
            transition: .6s ease;
        }

        /* =========================
VIEWER
========================= */
        .viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 99999;
            display: none;
            flex-direction: column;
        }

        .viewer.active {
            display: flex
        }

        .viewer-header {
            height: 60px;
            background: #2b9e75;
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 15px;
        }

        .viewer iframe {
            flex: 1;
            width: 100%;
            border: none;
        }

        /* LOADER */
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            font-size: 18px;
        }

        /* ANIMATION */
        body {
            animation: fadeIn .5s ease
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }
    </style>
</head>

<body>

    <div class="page">

        <!-- =========================
TOPBAR
========================= -->
        <div class="topbar">
            <div class="back-btn" onclick="goBack()">←</div>
            <div id="bookName">Hadith Book</div>
        </div>

        <div class="content">

            <!-- HEADER -->
            <div class="header">
                <div class="title" id="headerTitle">Hadith Book</div>
                <div id="headerSub">অধ্যায় তালিকা</div>
            </div>

            <!-- =========================
📌 LIST AUTO GENERATE হবে
========================= -->
            <div id="list"></div>

        </div>
    </div>

    <!-- =========================
PDF VIEWER
========================= -->
    <div class="viewer" id="viewer">
        <div class="viewer-header">
            <div class="back-btn" onclick="closeViewer()">←</div>
            <div id="viewerTitle">PDF</div>
        </div>

        <div id="loader" class="loader">Loading...</div>
        <iframe id="frame"></iframe>
    </div>

    <script>

        /* =========================
        ⚙️ CONFIG (এই অংশটাই শুধু বদলাবে)
        ========================= */

        const CONFIG = {
            name: "সহীহ বুখারী",

            // 👉 এখানে তোমার chapter + pdf link বসাও
            chapters: [
                { title: "১. ওহীর সূচনা", pdf: "https://drive.google.com/file/d/1xzPX43MzG53K2YlNEPPUte8K5Onq0k3u/preview" },
                { title: "২. ঈমান", pdf: "https://drive.google.com/file/d/1xzPX43MzG53K2YlNEPPUte8K5Onq0k3u/preview" },
                { title: "৩. ইলম", pdf: "https://drive.google.com/file/d/1xzPX43MzG53K2YlNEPPUte8K5Onq0k3u/preview" },
                { title: "৪. ওযু", pdf: "https://drive.google.com/file/d/1xzPX43MzG53K2YlNEPPUte8K5Onq0k3u/preview" },
                { title: "৫. গোসল", pdf: "https://drive.google.com/file/d/1xzPX43MzG53K2YlNEPPUte8K5Onq0k3u/preview" },
                { title: "৬. সালাত", pdf: "https://drive.google.com/file/d/1xzPX43MzG53K2YlNEPPUte8K5Onq0k3u/preview" }
            ]
        };

        /* =========================
        AUTO SET TITLE
        ========================= */
        document.getElementById("pageTitle").innerText = CONFIG.name;
        document.getElementById("bookName").innerText = CONFIG.name;
        document.getElementById("headerTitle").innerText = CONFIG.name;

        /* =========================
        CREATE LIST
        ========================= */
        const list = document.getElementById("list");

        CONFIG.chapters.forEach(ch => {
            const div = document.createElement("div");
            div.className = "card";
            div.innerText = ch.title;

            div.onclick = () => openPDF(ch.title, ch.pdf);

            list.appendChild(div);
        });

        /* =========================
        PDF VIEW
        ========================= */
        const viewer = document.getElementById("viewer");
        const frame = document.getElementById("frame");
        const loader = document.getElementById("loader");
        const viewerTitle = document.getElementById("viewerTitle");

        function openPDF(title, link) {

            viewer.classList.add("active");
            loader.style.display = "flex";
            frame.style.display = "none";

            viewerTitle.innerText = title;

            frame.src = link;

            frame.onload = () => {
                loader.style.display = "none";
                frame.style.display = "block";
            };
        }

        function closeViewer() {
            viewer.classList.remove("active");
            frame.src = "";
        }

        /* =========================
        BACK SYSTEM
        ========================= */
        function goBack() {
            const from = new URLSearchParams(window.location.search).get("from");

            if (from === "quran") location.href = "index.html#quran";
            else if (from === "hadith") location.href = "index.html#hadith";
            else if (from === "dua") location.href = "index.html#dua";
            else location.href = "index.html";
        }

        /* =========================
        ANIMATION
        ========================= */
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.classList.add("show");
                }
            });
        });

        setTimeout(() => {
            document.querySelectorAll('.card').forEach(el => {
                observer.observe(el);
            });
        }, 100);

    </script>

</body>

</html>

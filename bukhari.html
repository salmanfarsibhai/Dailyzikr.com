<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Content-Security-Policy" content="
default-src 'self';
frame-src https://drive.google.com;
style-src 'self' 'unsafe-inline';
script-src 'self' 'unsafe-inline';
">

    <title>সহিহ বুখারী</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', system-ui;
            background: #eef2f7;
            overflow: hidden;
        }

        /* APP CONTAINER */
        .app {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* TOPBAR */
        .topbar {
            height: 60px;
            background: #2B9E75;
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-weight: 600;
            z-index: 10;
        }

        .back-btn {
            margin-right: 10px;
            cursor: pointer;
        }

        /* MAIN */
        .main {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* LIST PANEL */
        .list-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            padding: 20px;
            overflow-y: auto;
            transition: 0.4s;
            z-index: 5;
        }

        .list-panel.hide {
            transform: translateY(-100%);
        }

        /* TITLE */
        .title {
            text-align: center;
            margin-bottom: 20px;
            color: #2B9E75;
            font-size: 22px;
        }

        /* CARD */
        .card {
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 1px solid #eee;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            background: #2B9E75;
            color: #fff;
            transform: translateX(6px);
        }

        /* VIEWER PANEL */
        .viewer-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f8f9fb;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: 0.4s;
        }

        .viewer-panel.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* PDF AREA */
        .viewer {
            flex: 1;
            border: none;
            width: 100%;
        }

        /* TOP ACTION BAR */
        .viewer-top {
            height: 50px;
            background: #fff;
            display: flex;
            align-items: center;
            padding: 0 10px;
            border-bottom: 1px solid #eee;
        }

        .back-list {
            cursor: pointer;
            color: #2B9E75;
            font-weight: 600;
        }

        /* LOADER */
        .loader {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 20px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #2B9E75;
            border-radius: 50%;
            animation: bounce 0.6s infinite alternate;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-10px);
            }
        }

        /* EMPTY */
        .empty {
            text-align: center;
            padding: 40px;
            color: #777;
        }
    </style>
</head>

<body>

    <div class="app">

        <div class="topbar">
            <span class="back-btn" onclick="goHome()">←</span>
            সহিহ বুখারী
        </div>

        <div class="main">

            <!-- LIST -->
            <div class="list-panel" id="listPanel">

                <div class="title">খণ্ড নির্বাচন করুন</div>

                <div class="card" data-link="https://drive.google.com/file/d/1xzPX43MzG53K2YlNEPPUte8K5Onq0k3u/preview">
                    খণ্ড ১</div>
                <div class="card" data-link="">খণ্ড ২</div>
                <div class="card" data-link="">খণ্ড ৩</div>
                <div class="card" data-link="">খণ্ড ৪</div>
                <div class="card" data-link="">খণ্ড ৫</div>
                <div class="card" data-link="">খণ্ড ৬</div>

            </div>

            <!-- VIEWER -->
            <div class="viewer-panel" id="viewerPanel">

                <div class="viewer-top">
                    <span class="back-list" onclick="backToList()">← খণ্ড তালিকা</span>
                </div>

                <div id="statusArea"></div>

                <iframe id="viewer" class="viewer"></iframe>

            </div>

        </div>
    </div>

    <script>

        /* HOME BACK */
        function goHome() {
            window.location.href = "../index.html";
        }

        /* DRIVE FIX */
        function convert(link) {
            return link.replace("/view", "/preview");
        }

        const cards = document.querySelectorAll(".card");
        const viewer = document.getElementById("viewer");
        const listPanel = document.getElementById("listPanel");
        const viewerPanel = document.getElementById("viewerPanel");
        const statusArea = document.getElementById("statusArea");

        /* CLICK */
        cards.forEach(card => {
            card.onclick = () => {

                const link = card.dataset.link.trim();

                /* SHOW VIEW */
                viewerPanel.classList.add("active");
                listPanel.classList.add("hide");

                /* LOADER */
                statusArea.innerHTML = `
<div class="loader">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
`;

                /* EMPTY */
                if (!link) {
                    statusArea.innerHTML = `<div class="empty">এখানে লিংক পেস্ট করুন</div>`;
                    viewer.src = "";
                    return;
                }

                /* LOAD PDF */
                viewer.src = convert(link);

                viewer.onload = () => {
                    statusArea.innerHTML = "";
                };

            };
        });

        /* BACK TO LIST */
        function backToList() {
            viewerPanel.classList.remove("active");
            listPanel.classList.remove("hide");
            viewer.src = "";
        }

    </script>

</body>

</html>
